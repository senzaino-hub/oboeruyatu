<style>
  #game {
    touch-action: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  #game * {
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    touch-action: none;
  }

  button {
    user-select: none;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
  }

  .gametitle {
    position: absolute;
    top: 15%;
    left: 50%;
    font-size: 34px;
    transform: translateX(-50%) translateY(-15%);
    color: black;
  }

  #sinkei {
    position: absolute;
    top: 30%;
    left: 50%;
    font-size: 15px;
    transform: translateX(-50%) translateY(-25%);
    color: black;
  }

  #gamestartbtn {
    position: absolute;
    padding: 30px 80px;
    top: 50%;
    left: 50%;
    font-size: 25px;
    transform: translateX(-50%) translateY(-50%);
    color: black;
    background-color: rgb(179, 222, 130);
  }

  #sankaninzuuset {
    position: absolute;
    padding: 10px 30px;
    top: 75%;
    left: 50%;
    font-size: 20px;

    color: black;

    left: 10%;
    font-size: 20px;

    left: 50%;

    top: 40%;
    left: 30%;
    font-size: 17px;
    transform: translateX(-30%) translateY(-40%);
    color: black;
    background-color: rgb(207, 98, 65);
  }

    position: absolute;
    padding: 50px 70px;
    top: 75%;
    left: 50%;
    white-space: pre;

    color: black;

//関数start
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function drawBlock(ctx, pattern, startX, startY, pixelSize = 10) {
  pattern.forEach((row, y) => {
    row.forEach((color, x) => {
      if (color != null) {
        ctx.fillStyle = color;
        ctx.fillRect(
          startX + x * pixelSize,
          startY + y * pixelSize,
          pixelSize,
          pixelSize
        );
      }
    });
  });
}

function byougasurukansuu() {
  for (i = 0; i < 6; i++) {
    for (j = 0; j < 6; j++) {
      if(boardbool[i][j] == false && board[i][j] > 0) {
        drawBlock(ctx, kardura, j * 60, i * 90, 6);
      }else if(boardbool[i][j] == true) {
        switch(board[i][j]) {
          case -2:
            switch(genzainoteban) {
              case 1:
                drawBlock(ctx, teban1pl, j * 60, i * 90, 6);
                break;
              case 2:
                drawBlock(ctx, teban2pl, j * 60, i * 90, 6);
                break;
              case 3:
                drawBlock(ctx, teban3pl, j * 60, i * 90, 6);
                break;
              case 4:
                drawBlock(ctx, teban4pl, j * 60, i * 90, 6);
                break;

            break;

      genzainoteban = 1;

      }else if (kaesitakaisuu == 1 && zqx != zpx || zqy != zpy) {
        boardbool[zqy][zqx] = true;
        byougasurukansuu();
        if(board[zpy][zpx] == board[cellY][cellX]) {
          tokuten[genzainoteban - 1] += 1;
          board[zpy][zpx] = 0;
          board[cellY][cellX] = 0;
          mouitidoteban.style.display = "block";

          kaesitakaisuu = 0;
        }else{
          kaesitakaisuu++;
          zahyouhyouzidayo.style.display = "block";
          canvastouchbool = false;
        }
      }
    }else if(kaesitakaisuu < 2 && board[cellY][cellX] != 0) {
      zqx = cellX;
      zqy = cellY;
    }
  }
  if(kaesitakaisuu < 2) {
    hyouzisuru = true;
  }

//gameloopstart
const FPS = 20;
const interval = 1000 / FPS;
let lastTime = 0;

function loop(time) {
  if(time - lastTime >= interval) {
    Update();
    if(hyouzisuru == true) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      byougasurukansuu();
      hyouzisuru = false;
    }
    lastTime = time;
  }
  requestAnimationFrame(loop);
}
